<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sepolia Block Height</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        h1 { color: #333; }
        button {
            padding: 12px 24px;
            font-size: 16px;
            background-color: #e8831a;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        button:hover { background-color: #cf6d13; }
        #result {
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>
    <h1>Sepolia Block Height</h1>
    <button onclick="getBlockHeight()">Get Current Block Height</button>
    <div id="result"></div>

    <script>
        async function getBlockHeight() {
            const resultDiv = document.getElementById('result');
            resultDiv.textContent = 'Loading...';
            try {
                await window.ethereum.request({ method: 'eth_requestAccounts' });
                const provider = new ethers.BrowserProvider(window.ethereum);
                const network = await provider.getNetwork();
                if (network.chainId !== 11155111n) {
                    resultDiv.textContent = 'Please switch MetaMask to Sepolia testnet!';
                    return;
                }
                const blockNumber = await provider.getBlockNumber();
                resultDiv.textContent = 'Current Block Height: ' + blockNumber;
            } catch (error) {
                resultDiv.textContent = 'Error: ' + error.message;
            }
        }
    </script>
</body>
</html>
